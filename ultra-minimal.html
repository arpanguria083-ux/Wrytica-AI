<!DOCTYPE html>
<html>
<head>
    <title>Ultra Minimal Test</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; }
        #output { background: #f0f0f0; padding: 10px; margin: 10px 0; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>Ultra Minimal Crash Test</h1>
    <p>Select multiple PDF files to test:</p>
    <input type="file" id="files" multiple accept=".pdf" style="margin: 20px 0;"><br>
    <button onclick="startTest()">Start Test</button>
    <button onclick="clearOutput()">Clear</button>
    <div id="output"></div>

    <script>
        function log(msg) {
            const el = document.getElementById('output');
            el.textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n';
            console.log(msg);
        }
        
        function clearOutput() {
            document.getElementById('output').textContent = '';
        }
        
        async function startTest() {
            const files = document.getElementById('files').files;
            if (files.length === 0) {
                alert('Please select files');
                return;
            }
            
            log(`Starting test with ${files.length} files`);
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                log(`[${i+1}/${files.length}] Processing: ${file.name}`);
                
                try {
                    // Create FormData
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    log(`  Uploading to backend...`);
                    
                    // Send to backend
                    const response = await fetch('http://localhost:8000/api/documents/process', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        log(`  ✅ Success: ${data.total_chunks} chunks`);
                    } else {
                        log(`  ❌ Error: HTTP ${response.status}`);
                    }
                } catch (e) {
                    log(`  ❌ Exception: ${e.message}`);
                }
                
                // Critical delay to prevent hang
                await new Promise(r => setTimeout(r, 500));
                
                // Force garbage collection hint
                if (window.gc) window.gc();
            }
            
            log('Test complete!');
        }
    </script>
</body>
</html>
