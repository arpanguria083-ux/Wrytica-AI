<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wrytica AI</title>

    <!-- Inter font — preconnect first so the DNS + TLS handshake starts early,
         then load with display=swap so text renders immediately in fallback font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- App CSS — Tailwind is now built locally by PostCSS (no CDN script) -->
    <link rel="stylesheet" href="/index.css" />

    <!-- Runtime config (feature flags etc.) -->
    <script src="/runtime-config.js"></script>
  </head>
  <body class="bg-gray-50 text-slate-900 dark:bg-dark-bg dark:text-slate-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
